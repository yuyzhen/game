<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小屋建造 · Canvas + PixiJS 对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; }
  #split { display: flex; width: 100%; height: 100%; }
  .half { flex: 1; position: relative; overflow: hidden; }
  .half canvas#cL { display: block; width: 100% !important; height: 100% !important; }
  .half .px-wrap { width: 100%; height: 100%; }
  .half .px-wrap canvas { display: block; }
  .divider { width: 1px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  .label {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.25);
    letter-spacing: 1.5px; text-transform: uppercase; pointer-events: none;
    background: rgba(0,0,0,0.4); padding: 2px 12px; border-radius: 10px;
  }
  .label span { color: #6366f1; }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px; z-index: 10;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    pointer-events: none;
  }
  #progress-wrap { width: 260px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #a78bfa); }
  #stage-label { color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; min-width: 100px; text-align: center; }
  #replay-btn {
    pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); padding: 6px 14px; border-radius: 20px; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all .2s;
  }
  #replay-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  #err {
    display: none; position: fixed; top: 50%; left: 25%; transform: translate(-50%,-50%);
    color: #ef4444; font-family: sans-serif; font-size: 14px; z-index: 20;
    background: rgba(0,0,0,0.8); padding: 16px 24px; border-radius: 10px;
  }
  @media (max-width: 700px) { #split { flex-direction: column; } .divider { width: 100%; height: 1px; } }

.back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 99999;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  transition: all 0.2s ease;
  cursor: pointer; pointer-events: auto;
  line-height: 1.4;
}
.back-btn:hover {
  background: rgba(99,102,241,0.2);
  border-color: rgba(99,102,241,0.35);
  color: #fff;
  transform: translateX(-2px);
}

</style>
</head>
<body>
<a class="back-btn" href="index.html" id="backBtn">&larr; 返回</a>

<div id="split">
  <div class="half">
    <canvas id="cL"></canvas>
    <div class="label">Canvas 2D <span>CPU</span></div>
  </div>
  <div class="divider"></div>
  <div class="half">
    <div id="pxRight" class="px-wrap"></div>
    <div class="label">PixiJS <span>GPU</span></div>
    <div id="err">PixiJS 加载中...</div>
  </div>
</div>
<div id="info">
  <span id="stage-label">地基施工</span>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <button id="replay-btn">↻ 重播</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.3/dist/pixi.min.js"
        onerror="document.getElementById('err').style.display='block';document.getElementById('err').textContent='❌ PixiJS 加载失败'">
</script>
<script>
// ================================================================
//  SHARED STATE
// ================================================================
const cL = document.getElementById('cL');
const ctxL = cL.getContext('2d');
const pxWrap = document.getElementById('pxRight');
let W, H, cx, gy, sc;
const DPR = Math.min(devicePixelRatio || 1, 2);

function resize() {
  const r = cL.parentElement.getBoundingClientRect();
  W = r.width; H = r.height;
  cL.width = W * DPR; cL.height = H * DPR;
  cL.style.width = W + 'px'; cL.style.height = H + 'px';
  cx = W/2; gy = H*0.74; sc = Math.min(W/1200, H/800, 1.6);
  if (pxApp) pxApp.renderer.resize(W, H);
}
window.addEventListener('resize', resize);

function HS() {
  const hw=0.22*W, hh=0.20*H, rh=0.10*H, ox=cx-hw/2, oy=gy;
  return {w:hw,h:hh,rh,l:ox,r:ox+hw,b:oy,t:oy-hh,peak:oy-hh-rh,rl:ox-28*sc,rr:ox+hw+28*sc};
}

// Colors
function H2(h){return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function LC(a,b,t){const c1=typeof a==='string'?H2(a):a,c2=typeof b==='string'?H2(b):b;return {r:Math.round(c1.r+(c2.r-c1.r)*t),g:Math.round(c1.g+(c2.g-c1.g)*t),b:Math.round(c1.b+(c2.b-c1.b)*t)};}
function RS(c){return `rgb(${c.r},${c.g},${c.b})`;}
function RA(c,a){return `rgba(${c.r},${c.g},${c.b},${a})`;}
function PN(c){return (c.r<<16)|(c.g<<8)|c.b;}
function PX(c){if(typeof c==='number')return c;if(typeof c==='string'){if(c[0]==='#')return parseInt(c.slice(1),16);const m=c.match(/\d+/g);if(m)return(+m[0]<<16)|(+m[1]<<8)|+m[2];}return 0xFFFFFF;}

const E={oC:t=>1-(1-t)**3,oQ:t=>t*(2-t),oB:t=>{const c=1.7;return --t*t*((c+1)*t+c)+1;}};
const ST=[{n:'地基施工',d:1400},{n:'墙体框架',d:1800},{n:'墙面填充',d:1300},{n:'红瓦屋顶',d:2000},{n:'安装大门',d:1200},{n:'安装窗户',d:1400},{n:'最后点缀',d:2000}];
const PAUSE=600;
let cur=0,el=0,ps=false,pe=0,pt=[],dtm=0.25;

let C=[];
function ci(){C=[{x:W*0.10,y:H*0.07,s:1,sp:0.12},{x:W*0.32,y:H*0.13,s:0.7,sp:0.08},{x:W*0.58,y:H*0.05,s:1.1,sp:0.14},{x:W*0.76,y:H*0.15,s:0.75,sp:0.07},{x:W*0.22,y:H*0.20,s:0.5,sp:0.06},{x:W*0.48,y:H*0.18,s:0.55,sp:0.10},];}
ci();

let BF=[],dX=0,dD=1,dL=0,dT=0,dTX=0;
function dib(){const h=HS();dX=h.r+60*sc;dTX=dX;BF=[];for(let i=0;i<3;i++)BF.push({x:h.r+100*sc+i*50*sc,y:gy-80*sc-i*30*sc,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1,w:Math.random()*Math.PI*2,tw:0,th:0,hue:[200,30,340][i]});}
dib();

// ================================================================
//  PIXIJS SETUP
// ================================================================
let pxApp = null, pxG = null, pxTrace = null;

function initPixi() {
  if (typeof PIXI === 'undefined') { document.getElementById('err').style.display='block'; return; }
  document.getElementById('err').style.display = 'none';
  if (pxApp) { pxApp.destroy(true); pxApp = null; }

  pxApp = new PIXI.Application({
    width: W, height: H,
    backgroundColor: 0x0d0d1a,
    antialias: true,
    resolution: Math.min(devicePixelRatio||1,2),
    autoDensity: true,
  });
  pxApp.ticker.stop(); // We manage our own animation loop
  pxWrap.innerHTML = '';
  pxWrap.appendChild(pxApp.view);
  pxApp.view.style.width = '100%';
  pxApp.view.style.height = '100%';
  pxApp.view.style.display = 'block';

  // Single Graphics object for everything
  pxG = new PIXI.Graphics();
  pxApp.stage.addChild(pxG);
}

// ================================================================
//  CANVAS DRAW
// ================================================================
function drawCanvas(hs, p, t, isN, ang, sX, sY) {
  ctxL.clearRect(0, 0, cL.width, cL.height);

  // Sky gradient
  const sDT={top:'#1B1B4A',bot:'#E88850'},sDY={top:'#1F4E8C',bot:'#B8E0F7'},sDK={top:'#1A1A3E',bot:'#E87040'};
  let sT,sB;
  if(t<0.15){const p2=t/0.15;sT=LC(sDT.top,sDY.top,p2);sB=LC(sDT.bot,sDY.bot,p2);}
  else if(t<0.75){sT=H2(sDY.top);sB=H2(sDY.bot);}
  else if(t<0.92){const p2=(t-0.75)/0.17;sT=LC(sDY.top,sDK.top,p2);sB=LC(sDY.bot,sDK.bot,p2);}
  else{const p2=Math.min((t-0.92)/0.08,1);sT=LC(sDK.top,'#0D0D1A',p2);sB=LC(sDK.bot,'#1A1020',p2);}
  const sg=ctxL.createLinearGradient(0,0,0,gy*DPR);
  sg.addColorStop(0,RS(sT));sg.addColorStop(1,RS(sB));
  ctxL.fillStyle=sg;ctxL.fillRect(0,0,cL.width,gy*DPR);

  // Sun
  if(!isN){const gs=0.5+0.5*Math.sin(ang),cr=(16+6*gs)*sc;
    const sc2=(t<0.15||t>0.85)?'#FFB347':'#FFF9C4';
    const sg2=ctxL.createRadialGradient(sX*DPR,sY*DPR,0,sX*DPR,sY*DPR,cr*DPR*2);
    sg2.addColorStop(0,sc2+'cc');sg2.addColorStop(0.5,sc2+'66');sg2.addColorStop(1,sc2+'00');
    ctxL.fillStyle=sg2;ctxL.beginPath();ctxL.arc(sX*DPR,sY*DPR,cr*DPR*2,0,Math.PI*2);ctxL.fill();
    ctxL.fillStyle=sc2;ctxL.beginPath();ctxL.arc(sX*DPR,sY*DPR,cr*DPR,0,Math.PI*2);ctxL.fill();
  }

  // Clouds
  const cb=isN?0.15:(t<0.15||t>0.85)?0.6:0.9;
  ctxL.fillStyle=`rgba(255,255,255,${cb*0.7})`;
  for(const c of C){const r=22*sc*c.s*DPR;
    ctxL.beginPath();ctxL.arc(c.x*DPR,c.y*DPR,r,0,Math.PI*2);
    ctxL.arc((c.x+r*1.2)*DPR,(c.y-r*0.3)*DPR,r*0.9,0,Math.PI*2);
    ctxL.arc((c.x+r*2.1)*DPR,c.y*DPR,r*0.85,0,Math.PI*2);
    ctxL.arc((c.x+r*0.7)*DPR,(c.y+r*0.2)*DPR,r*0.6,0,Math.PI*2);ctxL.fill();
  }

  // Hills
  const ht=isN?0.3:(t<0.15||t>0.85)?0.5:1;
  const hc=LC('#81C784',isN?'#1A2A1A':'#81C784',1-ht);
  ctxL.fillStyle=RA(hc,0.2*ht);
  ctxL.beginPath();ctxL.moveTo(0,gy*DPR);
  for(let x=0;x<=W;x+=2)ctxL.lineTo(x*DPR,(gy-30*sc*Math.sin(x*0.003+1)-20*sc*Math.sin(x*0.007+3)-15*sc*Math.sin(x*0.015))*DPR);
  ctxL.lineTo(W*DPR,gy*DPR);ctxL.closePath();ctxL.fill();

  // Shadow
  const sl=0.5+1.5*Math.sin(ang)*Math.sin(ang);
  ctxL.fillStyle='rgba(0,0,0,0.04)';
  ctxL.beginPath();ctxL.ellipse((cx+8*sc*(1+Math.cos(ang)*0.5))*DPR,(gy+6*sc+20*sc*sl)*DPR,(hs.w*0.7+40*sc*sl)*DPR,(6+8*sl)*sc*DPR,Math.cos(ang)*0.2,0,Math.PI*2);ctxL.fill();

  // Ground
  const dn=isN?0.2:(t<0.15?0.5+t/0.15*0.5:(t>0.85?0.5+(1-t)/0.15*0.5:1));
  const dg=['#81C784','#66BB6A','#4CAF50','#388E3C'],ng=['#1A2A1A','#152215','#0F1A0F','#0A120A'];
  const gg=ctxL.createLinearGradient(0,gy*DPR,0,H*DPR);
  for(let i=0;i<4;i++)gg.addColorStop(i/3,RS(LC(ng[i],dg[i],dn)));
  ctxL.fillStyle=gg;ctxL.fillRect(0,gy*DPR,cL.width,(H-gy)*DPR);

  // House (scale to device pixels)
  ctxL.save();ctxL.scale(DPR,DPR);
  drawHouse(ctxL, hs, p, false);
  ctxL.restore();

  // Smoke (draw only, particles updated in loop)
  if(cur>=6) drawSmokeC(ctxL);

  // Dog + Butterflies
  if(cur>=3) drawDogBfly(ctxL, hs, false);
}

// ================================================================
//  PIXIJS DRAW
// ================================================================
function drawPixi(hs, p, t, isN, ang, sX, sY) {
  if (!pxG || !pxApp) return;
  pxG.clear();

  // Sky strips
  const sDT={top:'#1B1B4A',bot:'#E88850'},sDY={top:'#1F4E8C',bot:'#B8E0F7'},sDK={top:'#1A1A3E',bot:'#E87040'};
  let sT,sB;
  if(t<0.15){const p2=t/0.15;sT=LC(sDT.top,sDY.top,p2);sB=LC(sDT.bot,sDY.bot,p2);}
  else if(t<0.75){sT=H2(sDY.top);sB=H2(sDY.bot);}
  else if(t<0.92){const p2=(t-0.75)/0.17;sT=LC(sDY.top,sDK.top,p2);sB=LC(sDY.bot,sDK.bot,p2);}
  else{const p2=Math.min((t-0.92)/0.08,1);sT=LC(sDK.top,'#0D0D1A',p2);sB=LC(sDK.bot,'#1A1020',p2);}
  const skySteps=50;
  for(let i=0;i<skySteps;i++){const c=LC(sT,sB,i/skySteps);pxG.beginFill(PN(c));pxG.drawRect(0,(i/skySteps)*gy,W,gy/skySteps+1);pxG.endFill();}

  // Sun
  if(!isN){const gs=0.5+0.5*Math.sin(ang),cr=(16+6*gs)*sc;
    pxG.beginFill(PX(t<0.15||t>0.85?'#FFB347':'#FFF9C4'),0.85);pxG.drawCircle(sX,sY,cr);pxG.endFill();
  }

  // Clouds
  const cb=isN?0.15:(t<0.15||t>0.85)?0.6:0.9;
  for(const c of C){const r=22*sc*c.s;pxG.beginFill(0xFFFFFF,cb*0.7);
    pxG.drawCircle(c.x,c.y,r);pxG.drawCircle(c.x+r*1.2,c.y-r*0.3,r*0.9);
    pxG.drawCircle(c.x+r*2.1,c.y,r*0.85);pxG.drawCircle(c.x+r*0.7,c.y+r*0.2,r*0.6);pxG.endFill();
  }

  // Hills
  const ht=isN?0.3:(t<0.15||t>0.85)?0.5:1;
  const hc=LC('#81C784',isN?'#1A2A1A':'#81C784',1-ht);
  pxG.beginFill(PN(hc),0.2*ht);pxG.moveTo(0,gy);
  for(let x=0;x<=W;x+=3)pxG.lineTo(x,gy-30*sc*Math.sin(x*0.003+1)-20*sc*Math.sin(x*0.007+3)-15*sc*Math.sin(x*0.015));
  pxG.lineTo(W,gy);pxG.closePath();pxG.endFill();

  // Shadow
  const sl=0.5+1.5*Math.sin(ang)*Math.sin(ang);
  pxG.beginFill(0,0.04);
  pxG.drawEllipse(cx+8*sc*(1+Math.cos(ang)*0.5),gy+6*sc+20*sc*sl,hs.w*0.7+40*sc*sl,(6+8*sl)*sc);
  pxG.endFill();

  // Ground
  const dn=isN?0.2:(t<0.15?0.5+t/0.15*0.5:(t>0.85?0.5+(1-t)/0.15*0.5:1));
  const dg=['#81C784','#66BB6A','#4CAF50','#388E3C'],ng=['#1A2A1A','#152215','#0F1A0F','#0A120A'];
  const gSteps=20;
  for(let i=0;i<gSteps;i++){const y0=gy+(i/gSteps)*(H-gy),y1=gy+((i+1)/gSteps)*(H-gy);
    const col=LC(ng[Math.min(3,Math.floor(i/5))],dg[Math.min(3,Math.floor(i/5))],dn);
    pxG.beginFill(PN(col));pxG.drawRect(0,y0,W,y1-y0+1);pxG.endFill();
  }

  // House
  drawHouse(pxG, hs, p, true);

  // Smoke
  if(cur>=6) drawSmokeP(pxG);

  // Dog + Butterflies
  if(cur>=3) drawDogBfly(pxG, hs, true);
}

// ================================================================
//  HOUSE DRAWING (shared by Canvas and PixiJS)
// ================================================================
function drawHouse(g, hs, p, isPixi) {
  // Helper: line style — call with (color, width, alpha)
  const ls = (c, w, a) => {
    if(isPixi) g.lineStyle({width:w*sc,color:PX(c),alpha:a??1});
    else { g.strokeStyle=a!==undefined?`rgba(${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)},${a})`:c; g.lineWidth=w*sc; }
  };
  const bf = (c,a) => {
    if(isPixi) {
      if (a === undefined && c.startsWith('rgba')) {
        const m=c.match(/[\d.]+/g); g.beginFill(PX(c), m?parseFloat(m[3]):1);
      } else g.beginFill(PX(c), a??1);
    } else {
      if (a !== undefined && c[0]==='#') {
        const r=parseInt(c.slice(1,3),16), gg=parseInt(c.slice(3,5),16), bb=parseInt(c.slice(5,7),16);
        g.fillStyle = `rgba(${r},${gg},${bb},${a})`;
      } else g.fillStyle = c;
    }
  };
  const ef = () => { if(isPixi) g.endFill(); };
  const rect = (x,y,w,h) => { if(isPixi) g.drawRect(x,y,w,h); else g.fillRect(x,y,w,h); };
  const circ = (x,y,r) => { if(isPixi){g.drawCircle(x,y,r);}else{g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();} };

  // Foundation
  if(cur>=0){
    const fw=hs.w+44*sc,fh=16*sc,rw=fw*E.oC(cur>0?1:p),rx=cx-rw/2;
    bf('#BDBDBD');rect(rx,gy-fh,rw,fh);ef();
    bf('rgba(255,255,255,0.2)');rect(rx,gy-fh,rw,2.5*sc);ef();
  }

  // Wall Frame
  if(cur>=1){
    const pp=cur>1?1:p,studs=7,gap=hs.w/(studs-1),cnt=Math.ceil(studs*E.oC(Math.min(pp*1.15,1)));
    for(let i=0;i<cnt&&i<studs;i++){const x=hs.l+gap*i,sp=Math.max(0,Math.min(1,(pp*studs-i)/0.7));
      if(sp<=0)continue;const h=hs.h*sp;
      ls('#8D6E63',5,Math.min(1,sp*3));
      if(isPixi){g.moveTo(x,gy);g.lineTo(x,gy-h);}
      else{g.beginPath();g.moveTo(x,gy);g.lineTo(x,gy-h);g.stroke();}
    }
    if(pp>0.3){const pp2=Math.min((pp-0.3)/0.7,1),py=gy-hs.h*pp2;
      ls('#6D4C41',6);if(isPixi){g.moveTo(hs.l,py);g.lineTo(hs.r,py);}
      else{g.beginPath();g.moveTo(hs.l,py);g.lineTo(hs.r,py);g.stroke();}
    }
    ls('#6D4C41',5);
    if(isPixi){g.moveTo(hs.l,gy);g.lineTo(hs.r,gy);}
    else{g.beginPath();g.moveTo(hs.l,gy);g.lineTo(hs.r,gy);g.stroke();}
  }

  // Walls
  if(cur>=2){
    const pp=cur>2?1:p,planks=12,ph=hs.h/planks,vis=Math.ceil(planks*E.oQ(pp));
    for(let i=0;i<vis&&i<planks;i++){const pp2=Math.max(0,Math.min(1,(pp*planks-i)/0.6));if(pp2<=0)continue;
      bf('#FFF3D6',Math.min(1,pp2*4));rect(hs.l,gy-(i+1)*ph,hs.w,ph*pp2);ef();
    }
  }

  // Roof
  if(cur>=3){
    const pp=cur>3?1:p,by=hs.t,trh=hs.t-hs.peak,crh=trh*E.oC(pp),py2=by-crh;
    bf('#3E2723');
    if(isPixi){g.moveTo(hs.rl-5*sc,by);g.lineTo(cx,by-trh*Math.min(pp*1.5,1));g.lineTo(hs.rr+5*sc,by);g.closePath();ef();}
    else{g.beginPath();g.moveTo(hs.rl-5*sc,by);g.lineTo(cx,by-trh*Math.min(pp*1.5,1));g.lineTo(hs.rr+5*sc,by);g.closePath();g.fill();}

    const tr=7,tw=(hs.rr-hs.rl)/12,th2=trh/tr*1.3;
    for(let row=0;row<tr;row++){const ry=by-(row+0.3)*(trh/tr);if(ry<py2-th2)continue;
      const rp=Math.max(0,Math.min(1,(pp*tr-row)/0.5));if(rp<=0)continue;
      const rt=(by-ry)/trh,rl2=hs.rl+(cx-hs.rl)*rt-tw,rr2=hs.rr-(hs.rr-cx)*rt+tw;
      const cols=Math.ceil((rr2-rl2)/tw),off=(row%2)*tw*0.5;
      for(let col=0;col<cols;col++){const tx=rl2+col*tw+off-tw*0.3,tp=Math.max(0,Math.min(1,(rp*2-col/cols)/0.6));if(tp<=0)continue;
        const sy=(ry-th2*0.1)+th2*(1-E.oB(tp));
        bf('#D32F2F',Math.min(1,tp*2));
        if(isPixi){g.moveTo(tx+2*sc,sy);g.quadraticCurveTo(tx+tw*0.55,sy+th2*0.3,tx+tw-2*sc,sy);
          g.lineTo(tx+tw-2*sc,sy+th2*0.85);g.quadraticCurveTo(tx+tw*0.5,sy+th2*1.1,tx+2*sc,sy+th2*0.85);g.closePath();ef();}
        else{g.beginPath();g.moveTo(tx+2*sc,sy);g.quadraticCurveTo(tx+tw*0.55,sy+th2*0.3,tx+tw-2*sc,sy);
          g.lineTo(tx+tw-2*sc,sy+th2*0.85);g.quadraticCurveTo(tx+tw*0.5,sy+th2*1.1,tx+2*sc,sy+th2*0.85);g.closePath();g.fill();}
      }
    }
    if(pp>0.7){const rp2=Math.min((pp-0.7)/0.3,1);
      ls('#B71C1C',7,rp2);
      if(isPixi){g.moveTo(hs.rl,by);g.lineTo(cx,py2);g.lineTo(hs.rr,by);}
      else{g.beginPath();g.moveTo(hs.rl,by);g.lineTo(cx,py2);g.lineTo(hs.rr,by);g.stroke();}
    }
  }

  // Door
  if(cur>=4){const pp=cur>4?1:p,dw=48*sc,dh=82*sc,dx=cx-dw/2,dy=gy-dh*E.oB(Math.min(pp*1.2,1));
    bf('#4E342E');rect(dx-4*sc,dy-3*sc,dw+8*sc,(dh+4*sc)*Math.min(pp*1.5,1));ef();
    const dp=Math.min(pp*1.4,1),dh2=dh*E.oB(dp),dy2=gy-dh2;
    bf('#6D4C41');rect(dx,dy2,dw,dh2);ef();
    if(pp>0.5){const hp=Math.min((pp-0.5)/0.5,1);
      bf('#FFD54F');circ(dx+dw-13*sc,dy2+dh2*0.55,3.5*sc*hp);ef();}
  }

  // Windows
  if(cur>=5){const pp=cur>5?1:p,ww=42*sc,wh=50*sc,wy=gy-hs.h*0.58;
    for(const wx of [hs.l+hs.w*0.20,hs.r-hs.w*0.20]){const wp=Math.max(0,Math.min(1,(pp*2-(wx===hs.l+hs.w*0.20?0:1))/0.6));if(wp<=0)continue;
      const cw=ww*E.oB(wp),ch=wh*E.oB(wp),ox=wx-cw/2,oy=wy-ch+wh*(1-E.oB(wp))*0.3;
      bf('#6D4C41');rect(ox,oy,cw,ch);ef();
      bf('#BBDEFB',0.75);rect(ox+5*sc,oy+5*sc,cw-10*sc,ch-10*sc);ef();
    }
  }

  // Details
  if(cur>=6){const pp=cur>6?1:p;
    const cw2=26*sc,ch2=65*sc*E.oC(Math.min(pp*1.2,1)),cx2=hs.r-hs.w*0.22,cb=hs.t+(hs.peak-hs.t)*0.18,ct=cb-ch2;
    bf('#8D6E63');rect(cx2-cw2/2,ct,cw2,ch2);ef();
    for(let i=0;i<6;i++){const sp=Math.max(0,Math.min(1,(pp*6-i)/0.5));if(sp<=0)continue;
      const sw=(14+(i*7)%6)*sc,sx=cx+((i/6)-0.5)*45*sc+((i*11)%8-4)*sc,sy=gy+3*sc+i*18*sc,dy2=4*sc*(1-E.oB(sp));
      bf('#A1887F');
      if(isPixi){g.drawEllipse(sx,sy+dy2,sw,3*sc);ef();}
      else{g.beginPath();g.ellipse(sx,sy+dy2,sw,3*sc,0,0,Math.PI*2);g.fill();}
    }
    const tx=hs.l-55*sc,th3=45*sc*E.oC(Math.min(pp*1.3,1));
    bf('#5D4037');rect(tx-5*sc,gy-th3,10*sc,th3);ef();
    const fp=Math.max(0,Math.min(1,(pp-0.15)/0.85));
    if(fp>0){const fr=32*sc*E.oB(fp),fc=gy-th3;
      bf('#2E7D32');if(isPixi){g.drawCircle(tx,fc-fr*0.2,fr*0.9);ef();g.drawCircle(tx-14*sc,fc-fr*0.7,fr*0.75);ef();g.drawCircle(tx+13*sc,fc-fr*0.5,fr*0.65);ef();}
      else{g.beginPath();g.arc(tx,fc-fr*0.2,fr*0.9,0,Math.PI*2);g.fill();g.beginPath();g.arc(tx-14*sc,fc-fr*0.7,fr*0.75,0,Math.PI*2);g.fill();g.beginPath();g.arc(tx+13*sc,fc-fr*0.5,fr*0.65,0,Math.PI*2);g.fill();}
    }
  }
}

// ================================================================
//  SMOKE — update once, draw twice
// ================================================================
function updateSmoke(p) {
  if (cur < 6) return;
  const hs=HS();
  const cx3=hs.r-hs.w*0.22, cb2=hs.t+(hs.peak-hs.t)*0.18;
  // Chimney height matches drawHouse: grows with progress
  const pp=Math.min(p*1.2,1), ch2=65*sc*E.oC(pp), ct2=cb2-ch2;
  if(isFinite(cx3)&&isFinite(ct2)){
    pt.push({x:cx3+(Math.random()-0.5)*8*sc,y:ct2-2*sc,
      vx:(Math.random()-0.5)*0.2,vy:-(0.3+Math.random()*0.4)*sc*0.04,
      r:4*sc+Math.random()*6*sc,alpha:0.3+Math.random()*0.2,life:1});
  }
  for(let i=pt.length-1;i>=0;i--){
    const p2=pt[i];p2.x+=p2.vx;p2.y+=p2.vy;p2.vy-=0.008;
    p2.vx+=(Math.random()-0.5)*0.03;p2.r+=0.08*sc;
    p2.life-=0.004;p2.alpha*=0.998;
    if(!isFinite(p2.x)||!isFinite(p2.y)||p2.life<=0||p2.alpha<0.005){pt.splice(i,1);}
  }
}

function drawSmokeC(g) { // Canvas 烟雾
  for(const p2 of pt){
    const a2=p2.alpha*Math.min(p2.life*2,1);
    g.fillStyle=`rgba(215,204,200,${a2*0.2})`;
    g.beginPath();g.arc(p2.x,p2.y,p2.r,0,Math.PI*2);g.fill();
  }
}

function drawSmokeP(g) { // PixiJS 烟雾（与 Canvas 一致）
  for(const p2 of pt){
    const a2=p2.alpha*Math.min(p2.life*2,1);
    g.beginFill(0xD7CCC8,a2*0.2);g.drawCircle(p2.x,p2.y,p2.r);g.endFill();
  }
}

// ================================================================
//  DOG & BUTTERFLIES
// ================================================================
function drawDogBfly(g, hs, isPixi){
  // Update
  for(const b of BF){b.w+=0.15;b.tw+=(Math.random()-0.5)*0.08;b.th+=(Math.random()-0.5)*0.08;b.vx+=b.tw*0.02;b.vy+=b.th*0.02;
    const ddx=b.x-dX,ddy=b.y-(gy-28*sc),dist=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dist<100*sc){const f=(100*sc-dist)/(100*sc)*0.5;b.vx+=(ddx/dist)*f;b.vy+=(ddy/dist)*f;}
    b.vx*=0.97;b.vy*=0.97;const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>2.5&&spd>0){b.vx=b.vx/spd*2.5;b.vy=b.vy/spd*2.5;}
    if(!isNaN(b.x)){b.x+=b.vx;b.y+=b.vy;}else{b.x=0;b.y=0;}
    const mn=hs.l-80*sc,Mx=W*0.92,my=gy-220*sc,My=gy-40*sc;
    if(b.x<mn){b.x=mn;b.vx*=-0.5;}if(b.x>Mx){b.x=Mx;b.vx*=-0.5;}
    if(b.y<my){b.y=my;b.vy*=-0.5;}if(b.y>My){b.y=My;b.vy*=-0.5;}
  }
  let nn=null,nd=Infinity;
  for(const b of BF){const d=Math.abs(b.x-dX);if(d<nd){nd=d;nn=b;}}
  const mn=hs.l-30*sc,Mx=W*0.92,spd=1.2*sc;
  if(nn){const dx=nn.x-dX;dD=dx>0?1:-1;const m=dx*0.02;dX+=m>0?Math.min(m,spd):Math.max(m,-spd);}
  else{if(Math.abs(dX-dTX)<10*sc)dTX=mn+Math.random()*(Mx-mn);const m=dTX-dX;dD=m>0?1:-1;dX+=m>0?Math.min(m*0.01,spd*0.5):Math.max(m*0.01,-spd*0.5);}
  dX=Math.max(mn,Math.min(Mx,dX));

  // Draw dog
  const s=sc,dx2=dX,ddy=gy-2*s;
  if(isPixi){
    g.beginFill(0,0.06);g.drawEllipse(dx2+2*s,ddy+2*s,24*s,5*s);g.endFill();
    dT+=0.08;const wag=Math.sin(dT)*14*s;
    g.lineStyle({width:7*s,color:0xD7A86E});g.moveTo(dx2-16*s*dD,ddy-20*s);
    g.quadraticCurveTo(dx2-(24*s+wag*0.8)*dD,ddy-38*s,dx2-(28*s+wag)*dD,ddy-34*s-Math.abs(wag)*0.4);
    dL+=Math.abs(dX-dTX)>5*s?0.1:0.02;
    g.beginFill(0xD7A86E);g.drawEllipse(dx2,ddy-16*s,22*s,13*s);g.endFill();
    g.beginFill(0xD7A86E);g.drawCircle(dx2+24*s*dD,ddy-32*s,14*s);g.endFill();
    g.beginFill(0xE8C99B);g.drawEllipse(dx2+24*s*dD,ddy-30*s,10*s,8*s);g.endFill();
    g.beginFill(0xF0DCC0);g.drawEllipse(dx2+32*s*dD,ddy-30*s,9*s,6*s);g.endFill();
    g.beginFill(0x2C1810);g.drawCircle(dx2+38*s*dD,ddy-30*s,3.5*s);g.endFill();
    g.beginFill(0xFFFFFF,0.9);g.drawEllipse(dx2+22*s*dD,ddy-35*s,4*s,4.5*s);g.endFill();
    g.beginFill(0x3E2723);g.drawCircle(dx2+22.5*s*dD,ddy-34.5*s,3*s);g.endFill();
    g.beginFill(0xC9956B);g.drawEllipse(dx2+12*s*dD,ddy-40*s,6*s,10*s);g.endFill();
    g.beginFill(0xC9956B);g.drawEllipse(dx2+34*s*dD,ddy-40*s,5*s,9*s);g.endFill();
  } else {
    g.fillStyle='rgba(0,0,0,0.06)';g.beginPath();g.ellipse(dx2+2*s,ddy+2*s,24*s,5*s,0,0,Math.PI*2);g.fill();
    dT+=0.08;const wag=Math.sin(dT)*14*s;
    g.strokeStyle='#D7A86E';g.lineWidth=7*s;g.lineCap='round';
    g.beginPath();g.moveTo(dx2-16*s*dD,ddy-20*s);
    g.quadraticCurveTo(dx2-(24*s+wag*0.8)*dD,ddy-38*s,dx2-(28*s+wag)*dD,ddy-34*s-Math.abs(wag)*0.4);g.stroke();
    dL+=Math.abs(dX-dTX)>5*s?0.1:0.02;
    g.fillStyle='#D7A86E';g.beginPath();g.ellipse(dx2,ddy-16*s,22*s,13*s,0,0,Math.PI*2);g.fill();
    g.fillStyle='#D7A86E';g.beginPath();g.arc(dx2+24*s*dD,ddy-32*s,14*s,0,Math.PI*2);g.fill();
    g.fillStyle='#E8C99B';g.beginPath();g.ellipse(dx2+24*s*dD,ddy-30*s,10*s,8*s,0,0,Math.PI*2);g.fill();
    g.fillStyle='#F0DCC0';g.beginPath();g.ellipse(dx2+32*s*dD,ddy-30*s,9*s,6*s,0,0,Math.PI*2);g.fill();
    g.fillStyle='#2C1810';g.beginPath();g.arc(dx2+38*s*dD,ddy-30*s,3.5*s,0,Math.PI*2);g.fill();
    g.fillStyle='#FFFFFF';g.beginPath();g.ellipse(dx2+22*s*dD,ddy-35*s,4*s,4.5*s,0,0,Math.PI*2);g.fill();
    g.fillStyle='#3E2723';g.beginPath();g.arc(dx2+22.5*s*dD,ddy-34.5*s,3*s,0,Math.PI*2);g.fill();
    g.fillStyle='#C9956B';g.beginPath();g.ellipse(dx2+12*s*dD,ddy-40*s,6*s,10*s,0,0,Math.PI*2);g.fill();
    g.fillStyle='#C9956B';g.beginPath();g.ellipse(dx2+34*s*dD,ddy-40*s,5*s,9*s,0,0,Math.PI*2);g.fill();
  }

  // Butterflies
  for(const b of BF){const wa=Math.sin(b.w)*0.6;
    for(const sd of[-1,1]){const col=b.hue===200?'#60A5FA':b.hue===30?'#F59E0B':'#EC4899';
      if(isPixi){const pc= PX(col);g.beginFill(pc,0.4);g.moveTo(b.x,b.y);
        g.quadraticCurveTo(b.x+sd*8*sc+wa*sd*4*sc,b.y-6*sc,b.x+sd*6*sc,b.y-3*sc);
        g.quadraticCurveTo(b.x+sd*4*sc+wa*sd*2*sc,b.y+2*sc,b.x,b.y);g.closePath();g.endFill();}
      else{g.fillStyle=col+'77';g.beginPath();g.moveTo(b.x,b.y);
        g.quadraticCurveTo(b.x+sd*8*sc+wa*sd*4*sc,b.y-6*sc,b.x+sd*6*sc,b.y-3*sc);
        g.quadraticCurveTo(b.x+sd*4*sc+wa*sd*2*sc,b.y+2*sc,b.x,b.y);g.closePath();g.fill();}
    }
    if(isPixi){g.beginFill(0x4A3728);g.drawEllipse(b.x,b.y,2*sc,6*sc);g.endFill();}
    else{g.fillStyle='#4A3728';g.beginPath();g.ellipse(b.x,b.y,2*sc,6*sc,0,0,Math.PI*2);g.fill();}
  }
}

// ================================================================
//  ANIMATION LOOP
// ================================================================
let lastT = 0;

function loop(time) {
  try {
    const dt = lastT ? Math.min(time - lastT, 50) : 16;
    lastT = time;

    if(ps){pe+=dt;if(pe>=PAUSE){ps=false;cur=(cur+1)%ST.length;el=0;if(cur===0)pt=[];}
    } else {el+=dt;if(el>=ST[cur].d){el=ST[cur].d;ps=true;pe=0;}}

    dtm+=dt/28000;if(dtm>1)dtm-=1;
    for(const c of C){c.x+=c.sp*sc*0.04;if(c.x>W+80*sc){c.x=-80*sc;c.y=H*(0.04+Math.random()*0.16);}}

    const p=ps?1:Math.min(el/ST[cur].d,1);
    const hs=HS();
    const t2=dtm,ang=t2*Math.PI;
    const sX=W*0.03+t2*W*0.94,sY=gy-20*sc-Math.sin(ang)*(gy*0.48);
    const isN=t2>0.94||t2<0.06;

    // UI
    const pf=document.getElementById('progress-fill'), sl=document.getElementById('stage-label');
    if(pf) pf.style.width=((cur+(ps?1:p))/ST.length*100)+'%';
    if(sl) sl.textContent=ps&&cur===ST.length-1&&pe>PAUSE*0.7?'✨ 完工！':ST[cur].n;

    // Update smoke particles (once per frame)
    updateSmoke(p);

    // Draw
    drawCanvas(hs, p, t2, isN, ang, sX, sY);
    if (pxApp && pxG) {
      drawPixi(hs, p, t2, isN, ang, sX, sY);
      pxApp.renderer.render(pxApp.stage);
    }
  } catch(e) {
    console.error('Loop error:', e.message);
  }
  requestAnimationFrame(loop);
}

// ================================================================
//  STARTUP
// ================================================================
resize();

// Init PixiJS after a short delay to let CDN script load
if (typeof PIXI !== 'undefined') {
  initPixi();
} else {
  document.getElementById('err').style.display = 'block';
  document.getElementById('err').textContent = '❌ PixiJS 未能加载，请检查网络';
  // Retry after a delay
  setTimeout(() => {
    if (typeof PIXI !== 'undefined') initPixi();
  }, 3000);
}

requestAnimationFrame(loop);

// Replay
document.getElementById('replay-btn').addEventListener('click',()=>{cur=0;el=0;ps=false;pe=0;pt=[];ci();dib();});
</script>
