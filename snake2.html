<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  .container {
    position: relative;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0, 180, 200, 0.08), 0 0 120px rgba(0, 0, 0, 0.6);
  }
  canvas {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(50, 50, 80, 0.5);
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls span {
    color: rgba(160, 160, 190, 0.7);
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .badge {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    background: rgba(0, 220, 180, 0.1);
    border: 1px solid rgba(0, 220, 180, 0.2);
    color: #00dcb4;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .badge:hover { background: rgba(0, 220, 180, 0.2); }
  .badge.active { background: rgba(0, 220, 180, 0.18); }

.back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 99999;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  transition: all 0.2s ease;
  cursor: pointer; pointer-events: auto;
  line-height: 1.4;
}
.back-btn:hover {
  background: rgba(99,102,241,0.2);
  border-color: rgba(99,102,241,0.35);
  color: #fff;
  transform: translateX(-2px);
}

</style>
</head>
<body>
<a class="back-btn" href="index.html" id="backBtn">&larr; 返回</a>

<div class="container">
  <canvas id="game"></canvas>
  <div class="controls">
    <span>↑↓←→ 操作</span>
    <span>·</span>
    <span>A 切换 AI</span>
    <span>·</span>
    <span>R 重开</span>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const W = 800, H = 600, GS = 20;
const GW = W / GS, GH = H / GS;
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ─── 配色 ───
const BG = '#09090f';
const GRID_LINE = 'rgba(30,30,50,0.5)';
const BORDER = '#323250';
const SNAKE_COLORS = [
  [0, 220, 180], [0, 200, 160], [0, 180, 140],
  [0, 160, 120], [0, 140, 100]
];
const FOOD_COLOR = '#ff3c3c';
const FOOD_GLOW = '#ff7850';
const TEXT_COLOR = '#dcdce6';
const DIM_COLOR = '#8c8ca0';

const DIRS = [[1,0],[0,1],[-1,0],[0,-1]];

// ─── 游戏状态 ───
let snake, direction, food, score, speed, gameOver, aiMode, tick, foodPhase, foodEatPulse;
let particles = [];
const BASE_SPEED = 1;
const SPEED_STEPS = [0.5, 1, 10, 50, 100, 1000];
const BASE_TICK_MS = 100;
let speedIndex = SPEED_STEPS.indexOf(BASE_SPEED);
let tickAccumulator = 0;
let lastLoopTime = 0;

function resetGame() {
  const mx = Math.floor(GW/2), my = Math.floor(GH/2);
  snake = [[mx, my], [mx-1, my], [mx-2, my]];
  direction = [1, 0];
  food = genFood();
  score = 0;
  speed = SPEED_STEPS[speedIndex];
  gameOver = false;
  aiMode = false;
  tick = 0;
  foodPhase = 0;
  foodEatPulse = 0;
  particles = [];
  tickAccumulator = 0;
  lastLoopTime = 0;
}

function setSpeedIndex(nextIndex) {
  speedIndex = Math.max(0, Math.min(SPEED_STEPS.length - 1, nextIndex));
  speed = SPEED_STEPS[speedIndex];
}

function changeSpeed(step) {
  setSpeedIndex(speedIndex + step);
}

function genFood() {
  const set = new Set(snake.map(p => p[0]+','+p[1]));
  let p;
  do {
    p = [Math.floor(Math.random()*GW), Math.floor(Math.random()*GH)];
  } while (set.has(p[0]+','+p[1]));
  return p;
}

// ─── BFS ───
function bfs(start, goal, obstacles) {
  const sk = start[0]+','+start[1];
  const gk = goal[0]+','+goal[1];
  if (sk === gk) return [start];
  if (obstacles.has(sk) || obstacles.has(gk)) return null;
  const q = [[start]];
  const seen = new Set([sk]);
  while (q.length) {
    const path = q.shift();
    const [x, y] = path[path.length-1];
    for (const [dx, dy] of DIRS) {
      const nx = x + dx, ny = y + dy;
      const nk = nx+','+ny;
      if (nx === goal[0] && ny === goal[1]) return [...path, [nx, ny]];
      if (nx >= 0 && nx < GW && ny >= 0 && ny < GH && !seen.has(nk) && !obstacles.has(nk)) {
        seen.add(nk);
        q.push([...path, [nx, ny]]);
      }
    }
  }
  return null;
}

// ─── 决策 ───
function autoCruiseDecision() {
  const [hx, hy] = snake[0];
  const [dx, dy] = direction;

  switch (true) {
    case hy === 0 && dy === -1:
      return [1, 0];
    case hy === 0 && dx === 1:
      return [0, 1];
    case dy === 1 && hx < GW - 1 && hy === GH - 2:
      return [1, 0];
    case dx === 1 && hx === GW - 1:
      return [0, 1];
    case hy === GH - 2 && dx === 1:
      return [0, -1];
    case hx === GW - 1 && dy === 1 && hy === GH - 1:
      return [-1, 0];
    case hy === GH - 1 && dx === -1 && hx === 0:
      return [0, -1];
    default:
      return direction;
  }
}

// ─── 粒子 ───
function spawnParticles(fx, fy) {
  for (let i = 0; i < 20; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    particles.push({
      x: fx * GS + GS/2, y: fy * GS + GS/2,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 30, maxLife: 30,
      color: ['#ff3c3c','#ff7850','#ffc864'][Math.floor(Math.random()*3)]
    });
  }
}

// ─── 更新 ───
function update() {
  tick++;
  foodPhase += 0.06;
  if (foodEatPulse > 0) foodEatPulse--;

  // 更新粒子
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (gameOver) return;

  if (aiMode) {
    direction = autoCruiseDecision();
  }

  const [hx, hy] = snake[0];
  const [dx, dy] = direction;
  const nh = [hx + dx, hy + dy];

  if (nh[0] < 0 || nh[0] >= GW || nh[1] < 0 || nh[1] >= GH ||
      snake.some(s => s[0] === nh[0] && s[1] === nh[1])) {
    gameOver = true;
    return;
  }

  snake.unshift(nh);

  if (nh[0] === food[0] && nh[1] === food[1]) {
    score += 10;
    spawnParticles(food[0], food[1]);
    foodEatPulse = 8;
    food = genFood();
    if (speed < 20) speed += 0.3;
  } else {
    snake.pop();
  }
}

// ─── 绘制 ───
function draw() {
  // 背景
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // 网格
  ctx.strokeStyle = GRID_LINE;
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += GS) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += GS) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 边框
  ctx.strokeStyle = BORDER;
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, H);

  // ─ 食物光晕 ─
  const fx = food[0] * GS + GS/2, fy = food[1] * GS + GS/2;
  const pulse = Math.abs(Math.sin(foodPhase * 2)) * 0.3 + 0.7;
  const glowR = 22 + Math.sin(foodPhase) * 4;
  for (let r = glowR; r > 0; r -= 3) {
    const alpha = (1 - r / glowR) * 0.5 * pulse;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,120,80,${alpha})`;
    ctx.fill();
  }

  // ─ 食物 ─
  const fs = 6 + Math.sin(foodPhase) * 2;
  ctx.beginPath();
  ctx.arc(fx, fy, fs, 0, Math.PI * 2);
  ctx.fillStyle = FOOD_COLOR;
  ctx.fill();
  // 高光
  ctx.beginPath();
  ctx.arc(fx - 3, fy - 3, fs/3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,200,150,0.7)';
  ctx.fill();

  // ─ 粒子 ─
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    const size = Math.max(1, alpha * 4);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    const c = hexToRgb(p.color);
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    ctx.fill();
  }

  // ─ 蛇 ─
  const n = snake.length;
  for (let i = 0; i < n; i++) {
    const [sx, sy] = snake[i];
    const t = i / Math.max(n - 1, 1);
    const ci = Math.min(Math.floor(t * (SNAKE_COLORS.length - 1)), SNAKE_COLORS.length - 2);
    const frac = t * (SNAKE_COLORS.length - 1) - ci;
    const c1 = SNAKE_COLORS[ci], c2 = SNAKE_COLORS[Math.min(ci + 1, SNAKE_COLORS.length - 1)];
    const color = [
      Math.round(c1[0] + (c2[0] - c1[0]) * frac),
      Math.round(c1[1] + (c2[1] - c1[1]) * frac),
      Math.round(c1[2] + (c2[2] - c1[2]) * frac),
    ];

    const radius = n > 1 ? 4 : GS/2;
    roundRect(sx * GS + 1, sy * GS + 1, GS - 2, GS - 2, radius, color);

    // 蛇头
    if (i === 0) {
      // 光晕
      for (let g = 6; g > 0; g -= 2) {
        ctx.shadowColor = `rgba(0,220,180,${0.08})`;
        ctx.shadowBlur = g * 2;
        roundRect(sx * GS - 1, sy * GS - 1, GS + 2, GS + 2, radius + g,
          [0, 220, 180, 0.05]);
      }
      ctx.shadowBlur = 0;

      // 眼睛
      const [ddx, ddy] = direction;
      let ex = sx * GS + GS/2, ey = sy * GS + GS/2;
      if (ddx === 1) ex += 4; else if (ddx === -1) ex -= 4;
      if (ddy === 1) ey += 4; else if (ddy === -1) ey -= 4;

      const offs = ddx !== 0 ? [[0, -3], [0, 3]] : [[-3, 0], [3, 0]];
      for (const [ox, oy] of offs) {
        const exx = ex + ox, eyy = ey + oy;
        ctx.beginPath();
        ctx.arc(exx, eyy, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(exx + ddx, eyy + ddy, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#14141e';
        ctx.fill();
      }
    }

    // 蛇尾
    if (i === n - 1 && n > 2) {
      ctx.beginPath();
      ctx.arc(sx * GS + GS/2, sy * GS + GS/2, GS/3, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
      ctx.fill();
    }
  }

  // ─ UI ─
  // 分数
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(10, 10, 150, 40, 6, null, true);
  ctx.fillStyle = TEXT_COLOR;
  ctx.font = '700 22px system-ui, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText(String(score), 22, 30);

  // 模式
  ctx.textAlign = 'right';
  ctx.font = '13px system-ui, sans-serif';
  ctx.fillStyle = aiMode ? '#00dcb4' : DIM_COLOR;
  ctx.fillText((aiMode ? 'AI' : '手动') + '  |  A 切换  |  + 加速  |  - 减速', W - 14, 22);
  ctx.fillStyle = DIM_COLOR;
  ctx.fillText('长度: ' + snake.length, W - 14, 42);
  ctx.fillStyle = '#00dcb4';
  ctx.fillText('倍率: x' + SPEED_STEPS[speedIndex], W - 14, 62);

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '700 42px system-ui, sans-serif';
    ctx.fillStyle = FOOD_COLOR;
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.font = '16px system-ui, sans-serif';
    ctx.fillStyle = TEXT_COLOR;
    ctx.fillText('得分: ' + score + '  |  按 R 重新开始', W/2, H/2 + 30);
  }
}

// ─── 辅助 ───
function roundRect(x, y, w, h, r, color, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) {
    ctx.fill();
  } else {
    ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
    ctx.fill();
  }
}

function hexToRgb(h) {
  const r = parseInt(h.slice(1,3), 16);
  const g = parseInt(h.slice(3,5), 16);
  const b = parseInt(h.slice(5,7), 16);
  return [r, g, b];
}

// ─── 游戏循环 ───
function loop(now = performance.now()) {
  if (!lastLoopTime) lastLoopTime = now;
  const delta = now - lastLoopTime;
  lastLoopTime = now;

  const stepInterval = BASE_TICK_MS / speed;
  tickAccumulator += delta;

  let safety = 0;
  while (tickAccumulator >= stepInterval && safety < 1000) {
    update();
    tickAccumulator -= stepInterval;
    safety++;
    if (gameOver) {
      tickAccumulator = 0;
      break;
    }
  }

  draw();
  requestAnimationFrame(loop);
}

// ─── 输入 ───
document.addEventListener('keydown', (e) => {
  const k = e.key;
  if (k === 'r' || k === 'R') { if (gameOver) resetGame(); return; }
  if (k === 'a' || k === 'A') { e.preventDefault(); aiMode = !aiMode; return; }

  if (!aiMode) {
    const cur = direction;
    if (k === 'ArrowUp' && cur[1] !== 1) { e.preventDefault(); direction = [0, -1]; }
    else if (k === 'ArrowDown' && cur[1] !== -1) { e.preventDefault(); direction = [0, 1]; }
    else if (k === 'ArrowLeft' && cur[0] !== 1) { e.preventDefault(); direction = [-1, 0]; }
    else if (k === 'ArrowRight' && cur[0] !== -1) { e.preventDefault(); direction = [1, 0]; }
  }
});

document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (key === '+' || key === '=' || key === 'Add') { e.preventDefault(); changeSpeed(1); return; }
  if (key === '-' || key === '_' || key === 'Subtract') { e.preventDefault(); changeSpeed(-1); return; }
});

resetGame();
loop();
</script>
<script>(function(){var b=document.getElementById("backBtn");if(document.referrer&&!document.referrer.includes("index.html")){b.href="javascript:history.back()";b.innerHTML="← 后退";}})();</script>
</body>
</html>
